name: Godot Xogot CI

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: godot-xogot-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.4.1"
  GODOT_BINARY: "Godot_v4.4.1-stable_linux.x86_64"

jobs:
  validate:
    name: Integrity, import, parse, boot and regression-test
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Audit Xogot project integrity
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/project_integrity.py

      - name: Install Godot 4.4.1
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            --output godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${GODOT_BINARY}.zip"
          unzip -q godot.zip
          chmod +x "${GODOT_BINARY}"
          mv "${GODOT_BINARY}" godot
          ./godot --version
          mkdir -p logs

      - name: Import project resources
        shell: bash
        run: |
          set -euo pipefail
          timeout 180 ./godot --headless --path . --import --quit --log-file logs/import.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/import.log; then
            cat logs/import.log
            exit 1
          fi

      - name: Parse regression test entrypoint
        shell: bash
        run: |
          set -euo pipefail
          timeout 60 ./godot --headless --path . --script res://tests/ci_smoke_test.gd --check-only --log-file logs/parse.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/parse.log; then
            cat logs/parse.log
            exit 1
          fi

      - name: Boot main scene headlessly
        shell: bash
        run: |
          set -euo pipefail
          timeout 60 ./godot --headless --path . --quit-after 10 --log-file logs/boot.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/boot.log; then
            cat logs/boot.log
            exit 1
          fi

      - name: Run core regression tests
        shell: bash
        run: |
          set -euo pipefail
          timeout 60 ./godot --headless --path . --script res://tests/ci_smoke_test.gd --log-file logs/tests.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/tests.log; then
            cat logs/tests.log
            exit 1
          fi
          grep -F "[CI] PASS" logs/tests.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godot-xogot-diagnostics
          path: logs
          if-no-files-found: ignore
          retention-days: 14
