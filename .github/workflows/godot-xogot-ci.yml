name: Godot Xogot CI

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: godot-xogot-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.4.1"
  GODOT_BINARY: "Godot_v4.4.1-stable_linux.x86_64"

jobs:
  validate:
    name: Integrity, release audit, exports, visuals and regressions
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Audit Xogot project integrity
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p logs
          python3 -m py_compile tools/*.py
          python3 tools/project_integrity.py | tee logs/project-integrity.log

      - name: Audit public release readiness
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/release_readiness.py --output logs/release-readiness.json | tee logs/release-readiness.log

      - name: Install Godot 4.4.1 compatibility runtime
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            --output godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${GODOT_BINARY}.zip"
          unzip -q godot.zip
          chmod +x "${GODOT_BINARY}"
          mv "${GODOT_BINARY}" godot
          ./godot --version

      - name: Import project resources
        shell: bash
        run: |
          set -euo pipefail
          timeout 180 ./godot --headless --path . --import --quit --log-file logs/import.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/import.log; then
            cat logs/import.log
            exit 1
          fi

      - name: Parse regression entrypoints
        shell: bash
        run: |
          set -euo pipefail
          timeout 60 ./godot --headless --path . --script res://tests/ci_smoke_test.gd --check-only --log-file logs/parse-core.log
          timeout 60 ./godot --headless --path . --script res://tests/experience_systems_test.gd --check-only --log-file logs/parse-experience.log
          timeout 60 ./godot --headless --path . --script res://tests/development_profile_test.gd --check-only --log-file logs/parse-development.log
          timeout 60 ./godot --headless --path . --script res://tests/release_readiness_test.gd --check-only --log-file logs/parse-release.log
          timeout 60 ./godot --headless --path . --script res://tests/visual_layout_test.gd --check-only --log-file logs/parse-visual.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/parse-*.log; then
            cat logs/parse-*.log
            exit 1
          fi

      - name: Boot main scene headlessly
        shell: bash
        run: |
          set -euo pipefail
          timeout 60 ./godot --headless --path . --quit-after 10 --log-file logs/boot.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/boot.log; then
            cat logs/boot.log
            exit 1
          fi

      - name: Validate cross-platform export packs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p builds/ci
          declare -A presets=(
            [windows]="Windows Desktop"
            [ios]="iOS Xogot"
            [android]="Android"
            [web]="Web"
            [linux]="Linux"
            [macos]="macOS"
          )
          for slug in windows ios android web linux macos; do
            preset="${presets[$slug]}"
            log="logs/export-${slug}.log"
            timeout 120 ./godot --headless --path . --export-pack "$preset" "builds/ci/${slug}.pck" --log-file "$log"
            test -s "builds/ci/${slug}.pck"
            if grep -E "SCRIPT ERROR|^ERROR:" "$log"; then
              cat "$log"
              exit 1
            fi
          done

      - name: Run core regression tests
        shell: bash
        run: |
          set -euo pipefail
          timeout 90 ./godot --headless --path . --script res://tests/ci_smoke_test.gd --log-file logs/tests-core.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/tests-core.log; then
            cat logs/tests-core.log
            exit 1
          fi
          grep -F "[CI] PASS" logs/tests-core.log

      - name: Run experience regression tests
        shell: bash
        run: |
          set -euo pipefail
          timeout 90 ./godot --headless --path . --script res://tests/experience_systems_test.gd --log-file logs/tests-experience.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/tests-experience.log; then
            cat logs/tests-experience.log
            exit 1
          fi
          grep -F "[CI-XP] PASS" logs/tests-experience.log

      - name: Run development and localization regression tests
        shell: bash
        run: |
          set -euo pipefail
          timeout 90 ./godot --headless --path . --script res://tests/development_profile_test.gd --log-file logs/tests-development.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/tests-development.log; then
            cat logs/tests-development.log
            exit 1
          fi
          grep -F "[CI-DEV] PASS" logs/tests-development.log

      - name: Run release stress and migration tests
        shell: bash
        run: |
          set -euo pipefail
          timeout 120 ./godot --headless --path . --script res://tests/release_readiness_test.gd --log-file logs/tests-release.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/tests-release.log; then
            cat logs/tests-release.log
            exit 1
          fi
          grep -F "[CI-RELEASE] PASS" logs/tests-release.log

      - name: Run responsive visual layout tests
        shell: bash
        run: |
          set -euo pipefail
          timeout 120 ./godot --headless --path . --script res://tests/visual_layout_test.gd --log-file logs/tests-visual.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/tests-visual.log; then
            cat logs/tests-visual.log
            exit 1
          fi
          grep -F "[CI-VISUAL] PASS" logs/tests-visual.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godot-xogot-diagnostics-4.4
          path: logs
          if-no-files-found: ignore
          retention-days: 14

  xogot-46:
    name: Xogot Godot 4.6.3 import, boot and full regressions
    runs-on: ubuntu-latest
    timeout-minutes: 22
    env:
      GODOT_VERSION: "4.6.3"
      GODOT_BINARY: "Godot_v4.6.3-stable_linux.x86_64"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Audit runtime architecture
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p logs
          python3 -m py_compile tools/*.py
          python3 tools/project_integrity.py | tee logs/project-integrity.log

      - name: Install Godot 4.6.3 Xogot runtime target
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            --output godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${GODOT_BINARY}.zip"
          unzip -q godot.zip
          chmod +x "${GODOT_BINARY}"
          mv "${GODOT_BINARY}" godot
          ./godot --version

      - name: Import with Godot 4.6.3
        shell: bash
        run: |
          set -euo pipefail
          timeout 180 ./godot --headless --path . --import --quit --log-file logs/import-46.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/import-46.log; then
            cat logs/import-46.log
            exit 1
          fi

      - name: Parse all test entrypoints on 4.6.3
        shell: bash
        run: |
          set -euo pipefail
          for script in ci_smoke_test experience_systems_test development_profile_test release_readiness_test visual_layout_test; do
            timeout 60 ./godot --headless --path . --script "res://tests/${script}.gd" --check-only --log-file "logs/parse-${script}-46.log"
          done
          if grep -E "SCRIPT ERROR|^ERROR:" logs/parse-*-46.log; then
            cat logs/parse-*-46.log
            exit 1
          fi

      - name: Boot premium main scene on 4.6.3
        shell: bash
        run: |
          set -euo pipefail
          timeout 60 ./godot --headless --path . --quit-after 10 --log-file logs/boot-46.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/boot-46.log; then
            cat logs/boot-46.log
            exit 1
          fi

      - name: Run full regression suite on 4.6.3
        shell: bash
        run: |
          set -euo pipefail
          timeout 90 ./godot --headless --path . --script res://tests/ci_smoke_test.gd --log-file logs/tests-core-46.log
          timeout 90 ./godot --headless --path . --script res://tests/experience_systems_test.gd --log-file logs/tests-experience-46.log
          timeout 90 ./godot --headless --path . --script res://tests/development_profile_test.gd --log-file logs/tests-development-46.log
          timeout 120 ./godot --headless --path . --script res://tests/release_readiness_test.gd --log-file logs/tests-release-46.log
          timeout 120 ./godot --headless --path . --script res://tests/visual_layout_test.gd --log-file logs/tests-visual-46.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/tests-*-46.log; then
            cat logs/tests-*-46.log
            exit 1
          fi
          grep -F "[CI] PASS" logs/tests-core-46.log
          grep -F "[CI-XP] PASS" logs/tests-experience-46.log
          grep -F "[CI-DEV] PASS" logs/tests-development-46.log
          grep -F "[CI-RELEASE] PASS" logs/tests-release-46.log
          grep -F "[CI-VISUAL] PASS" logs/tests-visual-46.log

      - name: Upload Xogot 4.6 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godot-xogot-diagnostics-4.6
          path: logs
          if-no-files-found: ignore
          retention-days: 14
