name: Godot Xogot CI

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: godot-xogot-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6.3"
  GODOT_BINARY: "Godot_v4.6.3-stable_linux.x86_64"

jobs:
  validate:
    name: Xogot 4.6 integrity, AAA budgets, exports and regressions
    runs-on: ubuntu-latest
    timeout-minutes: 42

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Audit Xogot project integrity
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p logs builds/ci
          python3 -m py_compile tools/*.py
          python3 tools/project_integrity.py | tee logs/project-integrity.log

      - name: Audit public release readiness
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/release_readiness.py --output logs/release-readiness.json | tee logs/release-readiness.log

      - name: Enforce AAA development baseline
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/aaa_production_gate.py \
            --profile development \
            --output logs/aaa-development-gate.json | tee logs/aaa-development-gate.log
          grep -F "[AAA-GATE] PASS (development)" logs/aaa-development-gate.log

      - name: Install Godot 4.6.3 Xogot runtime target
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            --output godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${GODOT_BINARY}.zip"
          unzip -q godot.zip
          chmod +x "${GODOT_BINARY}"
          mv "${GODOT_BINARY}" godot
          ./godot --version

      - name: Import project resources
        shell: bash
        run: |
          set -euo pipefail
          timeout 180 ./godot --headless --path . --import --quit --log-file logs/import.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/import.log; then
            cat logs/import.log
            exit 1
          fi

      - name: Parse all regression entrypoints
        shell: bash
        run: |
          set -euo pipefail
          for script in ci_smoke_test experience_systems_test development_profile_test partner_world_test wave4_partner_world_test wave5_learning_adventures_test aaa_production_test release_readiness_test visual_layout_test; do
            timeout 90 ./godot --headless --path . --script "res://tests/${script}.gd" --check-only --log-file "logs/parse-${script}.log"
          done
          if grep -E "SCRIPT ERROR|^ERROR:" logs/parse-*.log; then
            cat logs/parse-*.log
            exit 1
          fi

      - name: Boot premium main scene
        shell: bash
        run: |
          set -euo pipefail
          timeout 60 ./godot --headless --path . --quit-after 10 --log-file logs/boot.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/boot.log; then
            cat logs/boot.log
            exit 1
          fi

      - name: Validate cross-platform export packs
        shell: bash
        run: |
          set -euo pipefail
          declare -A presets=(
            [windows]="Windows Desktop"
            [ios]="iOS Xogot"
            [android]="Android"
            [web]="Web"
            [linux]="Linux"
            [macos]="macOS"
          )
          for slug in windows ios android web linux macos; do
            preset="${presets[$slug]}"
            log="logs/export-${slug}.log"
            timeout 120 ./godot --headless --path . --export-pack "$preset" "builds/ci/${slug}.pck" --log-file "$log"
            test -s "builds/ci/${slug}.pck"
            if grep -E "SCRIPT ERROR|^ERROR:" "$log"; then
              cat "$log"
              exit 1
            fi
          done

      - name: Run core regression tests
        shell: bash
        run: |
          set -euo pipefail
          timeout 90 ./godot --headless --path . --script res://tests/ci_smoke_test.gd --log-file logs/tests-core.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/tests-core.log; then
            cat logs/tests-core.log
            exit 1
          fi
          grep -F "[CI] PASS" logs/tests-core.log

      - name: Run experience and social regression tests
        shell: bash
        run: |
          set -euo pipefail
          timeout 90 ./godot --headless --path . --script res://tests/experience_systems_test.gd --log-file logs/tests-experience.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/tests-experience.log; then
            cat logs/tests-experience.log
            exit 1
          fi
          grep -F "[CI-XP] PASS" logs/tests-experience.log

      - name: Run development and localization regression tests
        shell: bash
        run: |
          set -euo pipefail
          timeout 90 ./godot --headless --path . --script res://tests/development_profile_test.gd --log-file logs/tests-development.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/tests-development.log; then
            cat logs/tests-development.log
            exit 1
          fi
          grep -F "[CI-DEV] PASS" logs/tests-development.log

      - name: Run partner-world clean-room regression tests
        shell: bash
        run: |
          set -euo pipefail
          timeout 120 ./godot --headless --path . --script res://tests/partner_world_test.gd --log-file logs/tests-partner-world.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/tests-partner-world.log; then
            cat logs/tests-partner-world.log
            exit 1
          fi
          grep -F "[CI-PARTNER] PASS" logs/tests-partner-world.log

      - name: Run navigable Signal Settlement regressions
        shell: bash
        run: |
          set -euo pipefail
          timeout 210 ./godot --headless --path . --script res://tests/wave4_partner_world_test.gd --log-file logs/tests-wave4-partner-world.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/tests-wave4-partner-world.log; then
            cat logs/tests-wave4-partner-world.log
            exit 1
          fi
          grep -F "[CI-WAVE4] PASS" logs/tests-wave4-partner-world.log

      - name: Run Learning Adventures regressions
        shell: bash
        run: |
          set -euo pipefail
          timeout 300 ./godot --headless --path . --script res://tests/wave5_learning_adventures_test.gd --log-file logs/tests-wave5-learning.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/tests-wave5-learning.log; then
            cat logs/tests-wave5-learning.log
            exit 1
          fi
          grep -F "[CI-WAVE5] PASS" logs/tests-wave5-learning.log

      - name: Run AAA runtime budget regression tests
        shell: bash
        run: |
          set -euo pipefail
          timeout 120 ./godot --headless --path . --script res://tests/aaa_production_test.gd --log-file logs/tests-aaa-production.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/tests-aaa-production.log; then
            cat logs/tests-aaa-production.log
            exit 1
          fi
          grep -F "[CI-AAA] PASS" logs/tests-aaa-production.log

      - name: Run release stress and migration tests
        shell: bash
        run: |
          set -euo pipefail
          timeout 120 ./godot --headless --path . --script res://tests/release_readiness_test.gd --log-file logs/tests-release.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/tests-release.log; then
            cat logs/tests-release.log
            exit 1
          fi
          grep -F "[CI-RELEASE] PASS" logs/tests-release.log

      - name: Run responsive visual layout tests
        shell: bash
        run: |
          set -euo pipefail
          timeout 120 ./godot --headless --path . --script res://tests/visual_layout_test.gd --log-file logs/tests-visual.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/tests-visual.log; then
            cat logs/tests-visual.log
            exit 1
          fi
          grep -F "[CI-VISUAL] PASS" logs/tests-visual.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godot-xogot-diagnostics-4.6
          path: logs
          if-no-files-found: ignore
          retention-days: 14
