name: Godot Xogot CI

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: godot-xogot-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.4.1"
  GODOT_BINARY: "Godot_v4.4.1-stable_linux.x86_64"

jobs:
  validate:
    name: Import, boot and smoke-test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Godot 4.4.1
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            --output godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${GODOT_BINARY}.zip"
          unzip -q godot.zip
          chmod +x "${GODOT_BINARY}"
          mv "${GODOT_BINARY}" godot
          ./godot --version

      - name: Import project resources
        shell: bash
        run: |
          set -euo pipefail
          timeout 180 ./godot --headless --path . --import --quit

      - name: Boot main scene headlessly
        shell: bash
        run: |
          set -euo pipefail
          timeout 60 ./godot --headless --path . --quit-after 10

      - name: Run core smoke tests
        shell: bash
        run: |
          set -euo pipefail
          timeout 60 ./godot --headless --path . --script res://tests/ci_smoke_test.gd
