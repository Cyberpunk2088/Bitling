name: Wave 5 Learning Adventures Gate

on:
  push:
    branches:
      - main
      - "agent/wave5-**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: wave5-learning-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6.3"
  GODOT_BINARY: "Godot_v4.6.3-stable_linux.x86_64"

jobs:
  learning-adventures:
    name: Twelve adventures, mastery, Bitling visuals, persistence and Xogot boot
    runs-on: ubuntu-latest
    timeout-minutes: 24

    steps:
      - name: Check out exact candidate
        uses: actions/checkout@v4

      - name: Validate Wave 5 contract
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p logs
          test -s scripts/core/learning_adventure_service.gd
          test -s scripts/core/learning_adventure_service_v2.gd
          test -s scripts/ui/learning_adventure_overlay.gd
          test -s scripts/ui/learning_adventure_overlay_v2.gd
          test -s scripts/ui/learning_adventure_overlay_v3.gd
          test -s scripts/ui/learning_overlay_v2.gd
          test -s scripts/ui/learning_companion_stage.gd
          test -s scripts/ui/learning_adventure_visual_polish.gd
          test -s tests/wave5_learning_adventures_test.gd
          test -s tests/wave5_learning_visual_polish_test.gd
          grep -F 'config/version="0.9.0"' project.godot
          grep -F 'LearningAdventures="*res://scripts/core/learning_adventure_service_v2.gd"' project.godot
          grep -F 'LearningAdventureOverlay="*res://scripts/ui/learning_adventure_overlay_v3.gd"' project.godot
          grep -F 'LearningAdventureVisualPolish="*res://scripts/ui/learning_adventure_visual_polish.gd"' project.godot
          grep -F 'LearningOverlay="*res://scripts/ui/learning_overlay_v2.gd"' project.godot
          grep -F '"pattern_observatory"' scripts/core/learning_adventure_service.gd
          grep -F '"systems_lab"' scripts/core/learning_adventure_service.gd
          grep -F 'application/short_version="0.9.0"' export_presets.cfg
          grep -F 'version/code=9' export_presets.cfg
          python3 tools/wave5_mobile_acceptance_gate.py | tee logs/wave5-mobile-acceptance.log

      - name: Install Godot 4.6.3
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            --output godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${GODOT_BINARY}.zip"
          unzip -q godot.zip
          chmod +x "${GODOT_BINARY}"
          mv "${GODOT_BINARY}" godot
          ./godot --version

      - name: Import and parse learning runtime
        shell: bash
        run: |
          set -euo pipefail
          timeout 180 ./godot --headless --path . --import --quit --log-file logs/wave5-import.log
          for script in wave5_learning_adventures_test wave5_learning_visual_polish_test; do
            timeout 90 ./godot --headless --path . --script "res://tests/${script}.gd" --check-only --log-file "logs/wave5-parse-${script}.log"
          done
          if grep -E "SCRIPT ERROR|^ERROR:" logs/wave5-*.log; then
            cat logs/wave5-*.log
            exit 1
          fi

      - name: Boot premium main scene
        shell: bash
        run: |
          set -euo pipefail
          timeout 60 ./godot --headless --path . --quit-after 10 --log-file logs/wave5-boot.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/wave5-boot.log; then
            cat logs/wave5-boot.log
            exit 1
          fi

      - name: Run Learning Adventures regressions
        shell: bash
        run: |
          set -euo pipefail
          timeout 240 ./godot --headless --path . --script res://tests/wave5_learning_adventures_test.gd --log-file logs/wave5-tests.log
          grep -F "[CI-WAVE5] PASS" logs/wave5-tests.log
          timeout 180 ./godot --headless --path . --script res://tests/wave5_learning_visual_polish_test.gd --log-file logs/wave5-visual-tests.log
          grep -F "[CI-WAVE5-VISUAL] PASS" logs/wave5-visual-tests.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/wave5-tests.log logs/wave5-visual-tests.log; then
            cat logs/wave5-tests.log logs/wave5-visual-tests.log
            exit 1
          fi

      - name: Upload Wave 5 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wave5-learning-adventures-evidence
          path: logs
          if-no-files-found: warn
          retention-days: 14
