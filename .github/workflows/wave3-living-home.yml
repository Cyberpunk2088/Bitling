name: Wave 3 Living Home Gate

on:
  push:
    branches:
      - main
      - "agent/wave3-**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: wave3-living-home-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6.3"
  GODOT_BINARY: "Godot_v4.6.3-stable_linux.x86_64"

jobs:
  living-home:
    name: Room simulation, persistence, 3D atmosphere and Xogot boot
    runs-on: ubuntu-latest
    timeout-minutes: 22

    steps:
      - name: Check out exact candidate
        uses: actions/checkout@v4

      - name: Validate Wave 3 production contract
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p logs
          test -s scripts/core/living_home_service.gd
          test -s scripts/core/living_home_service_v2.gd
          test -s scripts/ui/living_home_overlay.gd
          test -s scripts/ui/production_bitling_stage_3d_v10.gd
          test -s scripts/ui/production_bitling_stage_3d_v11.gd
          test -s scripts/ui/metafinal_visual_director_v9.gd
          test -s scripts/ui/premium_navigation_shell_v3.gd
          test -s tests/wave3_living_home_test.gd
          grep -F 'config/version="0.7.0"' project.godot
          grep -F 'LivingHome="*res://scripts/core/living_home_service_v2.gd"' project.godot
          grep -F 'LivingHomeOverlay="*res://scripts/ui/living_home_overlay.gd"' project.godot
          grep -F 'metafinal_visual_director_v9.gd' main.tscn
          grep -F 'premium_navigation_shell_v3.gd' main.tscn
          grep -F 'ProductionStage3DV11' scripts/ui/metafinal_visual_director_v9.gd
          grep -F 'application/short_version="0.7.0"' export_presets.cfg
          grep -F 'version/code=7' export_presets.cfg

      - name: Install Godot 4.6.3
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            --output godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${GODOT_BINARY}.zip"
          unzip -q godot.zip
          chmod +x "${GODOT_BINARY}"
          mv "${GODOT_BINARY}" godot
          ./godot --version

      - name: Import and parse Living Home runtime
        shell: bash
        run: |
          set -euo pipefail
          timeout 180 ./godot --headless --path . --import --quit --log-file logs/wave3-import.log
          timeout 90 ./godot --headless --path . --script res://tests/wave3_living_home_test.gd --check-only --log-file logs/wave3-parse.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/wave3-*.log; then
            cat logs/wave3-*.log
            exit 1
          fi

      - name: Boot premium main scene
        shell: bash
        run: |
          set -euo pipefail
          timeout 60 ./godot --headless --path . --quit-after 10 --log-file logs/wave3-boot.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/wave3-boot.log; then
            cat logs/wave3-boot.log
            exit 1
          fi

      - name: Run Living Home regressions
        shell: bash
        run: |
          set -euo pipefail
          timeout 210 ./godot --headless --path . --script res://tests/wave3_living_home_test.gd --log-file logs/wave3-tests.log
          grep -F "[CI-WAVE3] PASS" logs/wave3-tests.log
          if grep -E "SCRIPT ERROR|^ERROR:" logs/wave3-tests.log; then
            cat logs/wave3-tests.log
            exit 1
          fi

      - name: Upload Wave 3 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wave3-living-home-evidence
          path: logs
          if-no-files-found: warn
          retention-days: 14
