name: Habitat World Consequence Gate

on:
  push:
    branches:
      - main
      - agent/habitat-world-consequences
    paths:
      - "project.godot"
      - "main.tscn"
      - "scripts/core/habitat_world_consequence_runtime.gd"
      - "scripts/ui/ultimate_dashboard_consequences.gd"
      - "scripts/ui/bitling_habitat_stage.gd"
      - "scripts/ui/habitat_world_consequence_overlay.gd"
      - "tests/habitat_world_consequence_test.gd"
      - "tools/habitat_world_consequence_gate.py"
      - "tools/habitat_world_consequence_mutation_test.py"
      - ".github/workflows/habitat-world-consequence-gate.yml"
  pull_request:
    paths:
      - "project.godot"
      - "main.tscn"
      - "scripts/core/habitat_world_consequence_runtime.gd"
      - "scripts/ui/ultimate_dashboard_consequences.gd"
      - "scripts/ui/bitling_habitat_stage.gd"
      - "scripts/ui/habitat_world_consequence_overlay.gd"
      - "tests/habitat_world_consequence_test.gd"
      - "tools/habitat_world_consequence_gate.py"
      - "tools/habitat_world_consequence_mutation_test.py"
      - ".github/workflows/habitat-world-consequence-gate.yml"

permissions:
  contents: read

concurrency:
  group: habitat-world-consequence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  architecture:
    name: Enforce persistent playable world consequences
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Reject cosmetic or stateless room changes
        run: python3 tools/habitat_world_consequence_gate.py

  mutation:
    name: Attack world consequence invariants
    needs: architecture
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Prove world sabotage is rejected
        run: python3 tools/habitat_world_consequence_mutation_test.py

  runtime:
    name: Exercise persistent room changes and follow-up events
    needs: mutation
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot 4.6.3
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 --output godot.zip \
            https://github.com/godotengine/godot-builds/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip
          unzip -q godot.zip
          mkdir -p "$HOME/.local/bin"
          mv Godot_v4.6.3-stable_linux.x86_64 "$HOME/.local/bin/godot"
          chmod +x "$HOME/.local/bin/godot"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Import and parse project
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p logs
          godot --headless --path . --editor --quit 2>&1 | tee logs/world-import.log
      - name: Prove room consequences remain playable and persistent
        shell: bash
        run: |
          set -euo pipefail
          godot --headless --path . --script tests/habitat_world_consequence_test.gd 2>&1 | tee logs/world-runtime.log
          grep -F "[WORLD-GATE] PASS:" logs/world-runtime.log
          ! grep -F "[WORLD-GATE] BLOCKED:" logs/world-runtime.log
      - name: Preserve world consequence logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: habitat-world-consequence-gate-logs
          path: logs/*.log
          if-no-files-found: error
          retention-days: 14
