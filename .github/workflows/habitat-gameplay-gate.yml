name: Habitat Gameplay Gate

on:
  push:
    branches:
      - main
      - "agent/habitat-**"
    paths:
      - "project.godot"
      - "main.tscn"
      - "scripts/core/habitat_interaction_service.gd"
      - "scripts/core/habitat_behavior_runtime.gd"
      - "scripts/core/habitat_world_consequence_runtime.gd"
      - "scripts/ui/ultimate_dashboard_habitat.gd"
      - "scripts/ui/ultimate_dashboard_behavior.gd"
      - "scripts/ui/ultimate_dashboard_consequences.gd"
      - "scripts/ui/bitling_habitat_stage.gd"
      - "scripts/ui/habitat_hotspot_overlay.gd"
      - "scripts/ui/metafinal_visual_director_v9.gd"
      - "tests/habitat_gameplay_test.gd"
      - "tools/habitat_architecture_gate.py"
      - "tools/habitat_gate_mutation_test.py"
      - ".github/workflows/habitat-gameplay-gate.yml"
  pull_request:
    paths:
      - "project.godot"
      - "main.tscn"
      - "scripts/core/habitat_interaction_service.gd"
      - "scripts/core/habitat_behavior_runtime.gd"
      - "scripts/core/habitat_world_consequence_runtime.gd"
      - "scripts/ui/ultimate_dashboard_habitat.gd"
      - "scripts/ui/ultimate_dashboard_behavior.gd"
      - "scripts/ui/ultimate_dashboard_consequences.gd"
      - "scripts/ui/bitling_habitat_stage.gd"
      - "scripts/ui/habitat_hotspot_overlay.gd"
      - "scripts/ui/metafinal_visual_director_v9.gd"
      - "tests/habitat_gameplay_test.gd"
      - "tools/habitat_architecture_gate.py"
      - "tools/habitat_gate_mutation_test.py"
      - ".github/workflows/habitat-gameplay-gate.yml"

permissions:
  contents: read

concurrency:
  group: habitat-gameplay-${{ github.ref }}
  cancel-in-progress: true

jobs:
  architecture:
    name: Enforce habitat-first architecture
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Reject dashboard-only regressions
        run: python3 tools/habitat_architecture_gate.py

  mutation-resistance:
    name: Prove the gate detects sabotage
    needs: architecture
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Attack every protected invariant
        run: python3 tools/habitat_gate_mutation_test.py

  runtime:
    name: Parse, boot and exercise habitat loop
    needs:
      - architecture
      - mutation-resistance
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot 4.6.3
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 --output godot.zip \
            https://github.com/godotengine/godot-builds/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip
          unzip -q godot.zip
          mkdir -p "$HOME/.local/bin"
          mv Godot_v4.6.3-stable_linux.x86_64 "$HOME/.local/bin/godot"
          chmod +x "$HOME/.local/bin/godot"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Import and parse project
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p logs
          godot --headless --path . --editor --quit 2>&1 | tee logs/habitat-import.log
      - name: Exercise contextual habitat gameplay
        shell: bash
        run: |
          set -euo pipefail
          godot --headless --path . --script tests/habitat_gameplay_test.gd 2>&1 | tee logs/habitat-runtime.log
          grep -F "[HABITAT-GATE] PASS:" logs/habitat-runtime.log
          ! grep -F "[HABITAT-GATE] BLOCKED:" logs/habitat-runtime.log
      - name: Preserve habitat gate logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: habitat-gameplay-gate-logs
          path: logs/*.log
          if-no-files-found: error
          retention-days: 14
